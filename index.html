
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calorie App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!-- TOP -->

<div class="top">

<div id="date">Today</div>

<div class="calories">

<div id="calLeft">2500 kcal left</div>

<div class="bar">
<div id="barFill"></div>
</div>

<div class="cal-info">
<span id="calEaten">0 eaten</span>
<span id="calGoal">2500 goal</span>
</div>

</div>

</div>

<!-- DAILY TAB -->

<div id="dailyTab" class="tab active">

<!-- MACRO CIRCLES -->

<div class="macro-wrapper">

<div class="macro-card">

<div class="macro-circle" id="proteinCircle">
0%
</div>

<div class="macro-label">
Protein
</div>

<div class="macro-left" id="proteinLeft">
150g left
</div>

</div>

<div class="macro-card">

<div class="macro-circle" id="carbCircle">
0%
</div>

<div class="macro-label">
Carbs
</div>

<div class="macro-left" id="carbLeft">
250g left
</div>

</div>

<div class="macro-card">

<div class="macro-circle" id="fatCircle">
0%
</div>

<div class="macro-label">
Fat
</div>

<div class="macro-left" id="fatLeft">
70g left
</div>

</div>

</div>

<h2>Daily Foods</h2>

<div id="dailyList"></div>

<h2>Meal Templates</h2>

<div id="mealTemplates"></div>

</div>

<!-- FOOD TAB -->

<h2>Food Database</h2>

<input id="searchFood" placeholder="Search foods">

<div id="foodDatabase"></div>

<!-- ME TAB -->

<div id="meTab" class="tab">

<h2>Weight Tracking</h2>

<input id="weightInput" type="number" placeholder="Weight kg">

<button onclick="addWeight()">
Add Weight
</button>

<br><br>

<div id="weightList"></div>

</div>

<!-- FLOAT BUTTON -->

<button id="addBtn" onclick="openModal()">
+
</button>

<!-- MODAL -->

<div id="modalOverlay">

<div id="modal">

<h2>Quick Add</h2>

<button onclick="showQuickSection('existing')">
Add Existing Food
</button>

<button onclick="showQuickSection('manual')">
Add New Food
</button>

<button onclick="showQuickSection('template')">
Create Meal Template
</button>

<button onclick="closeModal()" class="close-btn">
Close
</button>

<!-- EXISTING FOOD -->

<div id="existingSection" class="quick-section">

<input id="quickSearch" placeholder="Search food">

<div id="quickFoodResults"></div>

</div>

<!-- MANUAL FOOD -->

<div id="manualSection" class="quick-section">

<input id="quickFoodName" placeholder="Food name">

<input id="quickFoodCalories" type="number"
placeholder="Calories">

<input id="quickFoodProtein" type="number"
placeholder="Protein">

<input id="quickFoodCarbs" type="number"
placeholder="Carbs">

<input id="quickFoodFat" type="number"
placeholder="Fat">

<button onclick="quickCreateFood()">
Create Food
</button>

</div>

<!-- TEMPLATE -->

<div id="templateSection" class="quick-section">

<input id="templateName"
placeholder="Template Name">

<button onclick="createTemplate()">
Create Current Day As Template
</button>

</div>

</div>

</div>

<!-- MODAL -->

<div id="modalOverlay">

<div id="modal">

<h2>Quick Add</h2>

<button onclick="showQuickSection('existing')">
Add Existing Food
</button>

<button onclick="showQuickSection('manual')">
Add New Food
</button>

<button onclick="showQuickSection('template')">
Create Meal Template
</button>

<button onclick="closeModal()" class="close-btn">
Close
</button>

<!-- EXISTING FOOD -->

<div id="existingSection" class="quick-section">

<input id="quickSearch" placeholder="Search food">

<div id="quickFoodResults"></div>

</div>

<!-- MANUAL FOOD -->

<div id="manualSection" class="quick-section">

<input id="quickFoodName" placeholder="Food name">

<input id="quickFoodCalories" type="number"
placeholder="Calories">

<input id="quickFoodProtein" type="number"
placeholder="Protein">

<input id="quickFoodCarbs" type="number"
placeholder="Carbs">

<input id="quickFoodFat" type="number"
placeholder="Fat">

<button onclick="quickCreateFood()">
Create Food
</button>

</div>

<!-- TEMPLATE -->

<div id="templateSection" class="quick-section">

<input id="templateName"
placeholder="Template Name">

<button onclick="createTemplate()">
Create Current Day As Template
</button>

</div>

</div>

</div>

<!-- NAV -->

<div class="nav">

<button onclick="showTab('daily')">
Daily
</button>

<button onclick="showTab('food')">
Food
</button>

<button onclick="showTab('me')">
Me
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
